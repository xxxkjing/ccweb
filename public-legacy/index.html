<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Claude Code Terminal</title>
  <link rel="stylesheet" href="/vendor/xterm.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: #1e1e1e;
    }
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: var(--background);
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    #terminal-wrapper {
      padding: 10px;
      height: 100%;
      width: 100%;
      box-sizing: border-box;
    }
    #terminal-container {
      width: 100%;
      height: 100%;
    }
    /* Hide scrollbar */
    .xterm-viewport {
      scrollbar-width: none !important;
    }
    .xterm-viewport::-webkit-scrollbar {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="terminal-wrapper">
    <div id="terminal-container"></div>
  </div>
  
  <script src="/vendor/xterm.js"></script>
  <script src="/vendor/xterm-addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-webgl@0.16.0/lib/xterm-addon-webgl.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
